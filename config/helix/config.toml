theme = "jellybeans"

[editor]
line-number = "relative"
bufferline = "never"
cursorline = true
true-color = true
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "▏"
skip-levels = 1

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true
display-inlay-hints = false

[editor.statusline]
left = ["mode", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["diagnostics"]
right = ["spinner", "selections", "register", "position", "file-encoding"]

# -----------------------------
# KEYBINDS
# -----------------------------

[keys.normal."space"]
l = "goto_last_accessed_file"
F = "file_picker"
f = "file_picker_in_current_directory"
e = ":sh tmux new-window -n fx '~/.config/helix/scripts/file-manager.sh open'"
g = ":sh tmux new-window -n gx '~/.config/helix/scripts/git-manager.sh open'"

[keys.normal]
x = "select_line_below"
X = "select_line_above"
D = "kill_to_line_end"
Y =   ["select_mode", "goto_line_end", "yank_main_selection_to_clipboard", "normal_mode", "collapse_selection"]
esc = ["collapse_selection",  "keep_primary_selection"]
C-j = [ "extend_to_line_bounds",  "delete_selection",  "paste_after" ]
C-k = [ "extend_to_line_bounds",  "delete_selection",  "move_line_up",  "paste_before" ]
