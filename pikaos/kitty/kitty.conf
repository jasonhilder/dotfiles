linux_display_server wayland
#font_family Lilex
font_family xenia-regular
bold_font auto
italic_font auto
bold_italic_font auto
font_size 12.5
disable_ligatures never
cursor_shape beam
scrollback_lines 10000
repaint_delay 6
sync_to_monitor yes
confirm_os_window_close 0
enable_audio_bell no

#window
window_padding_width 4
background_opacity  0.98

# Jellybeans theme for Kitty terminal
# Author: A. Fox
