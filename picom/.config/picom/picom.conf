backend = "glx";
glx-no-stencil = true;
vsync = true;
unredir-if-possible = true;

#################################
#           Fading              #
#################################

fading = true;

fade-in-step = 0.1;
fade-out-step = 0.1;

fade-delta = 10

# Do not fade on window open/close.
no-fading-openclose = true

