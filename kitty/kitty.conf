tab_bar_edge top
tab_title_template "{index}"
tab_bar_min_tabs 2
tab_bar_align center
tab_bar_style separator
tab_separator " | "
tab_activity_symbol *

# Tab colors
active_tab_foreground #000
active_tab_background #eee
inactive_tab_foreground #888
inactive_tab_background #111111
