# reload config file 
bind r source-file ~/.tmux.conf

set -g default-terminal "screen-256color"
set -ga terminal-overrides ',xterm-256color:Tc'
# set -g default-terminal "xterm-kitty"
# set -as terminal-overrides ',xterm-kitty:RGB'

setw -g mode-keys vi

# change pane numbers to start with 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -sg escape-time 0

# remap prefix from 'C-b' to 'C-f'
unbind l
unbind C-b
set-option -g prefix C-f
bind-key C-f send-prefix

# split panes using | and -
bind \\ split-window -h -l 38% -c "#{pane_current_path}"
bind - split-window -v  -l 38% -c "#{pane_current_path}"
unbind '"'
unbind %

# Toggle a floating terminal with Prefix + g
bind f if-shell -F '#{==:#{session_name},scratch}' {
    detach-client
} {
    display-popup -d "#{pane_current_path}" -xC -yC -w 95% -h 90% -E 'tmux attach-session -t scratch || tmux new-session -s scratch'
}

# switch panes using Alt-arrow without prefix
setw -g mode-keys vi
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

# Select windows with alt+num
bind-key -n M-1 selectw -t 1
bind-key -n M-2 selectw -t 2
bind-key -n M-3 selectw -t 3
bind-key -n M-4 selectw -t 3
bind-key -n M-5 selectw -t 3

bind m command-prompt "new-session -s %1"

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

################################################################################
##                                    DESIGN                                  ##
################################################################################

## Colors
set -g default-terminal "screen-256color"

## Loud or quiet?
set-option -g visual-activity off  # Do not notify for events on panes
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity on
set-option -g bell-action none

## STATUS BAR ##################################################################

## Status bar design
set -g status-justify left
set -g status-interval 2
set -g status-position top

# 'default' makes the background transparent
set -g status-style bg=default,fg=white 

set -g status-left ''

## Show PREFIX on right side - Minimal White/Gray
# Using color231 (White) and color235 (Dark Gray) for a clean look
set -g status-right '#[fg=black,bg=white,bold]#{?client_prefix, <PK> ,}#[fg=white,bg=default,bold] [#S]'

## Pane Borders - Minimalist
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=white

## Window status (the tabs) - Minimalist
setw -g window-status-current-style fg=white,bold,underscore
setw -g window-status-style fg=colour243

